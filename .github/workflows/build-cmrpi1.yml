name: Build cmrpi1

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'hosts/nixos-arm/cmrpi1/**'
      - 'overlays/**'
      - 'flake.nix'
      - 'flake.lock'

jobs:
  build:
    name: Build cmrpi1
    runs-on: [self-hosted, nixos, builder]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Build cmrpi1
        run: |
          CACHE_URL="file:///zfs/nixcache/cache"
          echo "Building cmrpi1..."
          nix build ".#nixosConfigurations.cmrpi1.config.system.build.toplevel" \
            --no-link \
            --max-jobs 2 \
            --cores 4
          echo "Copying to cache..."
          nix copy --to "$CACHE_URL" ".#nixosConfigurations.cmrpi1.config.system.build.toplevel"
          echo "cmrpi1: BUILD SUCCESS"

      - name: Build cmrpi1-minimal SD image
        run: |
          CACHE_URL="file:///zfs/nixcache/cache"
          echo "Building cmrpi1-minimal SD image..."
          nix build ".#nixosConfigurations.cmrpi1-minimal.config.system.build.sdImage" \
            --no-link \
            --max-jobs 2 \
            --cores 4
          echo "Copying SD image to cache..."
          nix copy --to "$CACHE_URL" ".#nixosConfigurations.cmrpi1-minimal.config.system.build.sdImage"
          echo "cmrpi1-minimal SD image: BUILD SUCCESS"

      - name: Notify build failure
        if: failure()
        run: |
          curl -sf -X POST https://apprise.xrs444.net/notify/apprise \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"Build Failed: cmrpi1\",\"body\":\"GitHub Actions build failed for cmrpi1. $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\",\"type\":\"failure\",\"tag\":\"critical-infra\"}" || true
