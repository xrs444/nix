name: Build xdash1

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'hosts/nixos-arm/xdash1/**'
      - 'overlays/**'
      - 'flake.nix'
      - 'flake.lock'

jobs:
  build:
    name: Build xdash1
    runs-on: [self-hosted, nixos, builder]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Build xdash1 large dependencies
        run: |
          CACHE_URL="file:///zfs/nixcache/cache"
          echo "Building large packages for xdash1..."
          # Build and cache large packages that take a long time to build
          for pkg in chromium gtk4 libadwaita gst_all_1.gst-plugins-bad pipewire openal-soft qt3d cairo zenity; do
            echo "Building $pkg..."
            nix build "nixpkgs#$pkg" --no-link --max-jobs 2 --cores 4 || echo "Warning: $pkg build failed, continuing..."
            nix copy --to "$CACHE_URL" "nixpkgs#$pkg" 2>/dev/null || echo "Warning: failed to cache $pkg, continuing..."
          done
          echo "Large packages cached"

      - name: Build xdash1
        run: |
          CACHE_URL="file:///zfs/nixcache/cache"
          echo "Building xdash1..."
          nix build ".#nixosConfigurations.xdash1.config.system.build.toplevel" \
            --no-link \
            --max-jobs 2 \
            --cores 4
          echo "Copying to cache..."
          nix copy --to "$CACHE_URL" ".#nixosConfigurations.xdash1.config.system.build.toplevel"
          echo "xdash1: BUILD SUCCESS"
