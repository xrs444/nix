name: Build xts1

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'hosts/nixos-arm/xts1/**'
      - 'overlays/**'
      - 'flake.nix'
      - 'flake.lock'

jobs:
  build:
    name: Build xts1
    runs-on: [self-hosted, nixos, builder]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Build xts1
        run: |
          CACHE_URL="file:///zfs/nixcache/cache"
          echo "Building xts1..."
          nix build ".#nixosConfigurations.xts1.config.system.build.toplevel" \
            --no-link \
            --max-jobs 2 \
            --cores 4
          echo "Copying to cache..."
          nix copy --to "$CACHE_URL" ".#nixosConfigurations.xts1.config.system.build.toplevel"
          echo "xts1: BUILD SUCCESS"

      - name: Build xts1-minimal SD image
        run: |
          CACHE_URL="file:///zfs/nixcache/cache"
          echo "Building xts1-minimal SD image..."
          nix build ".#nixosConfigurations.xts1-minimal.config.system.build.sdImage" \
            --no-link \
            --max-jobs 2 \
            --cores 4
          echo "Copying SD image to cache..."
          nix copy --to "$CACHE_URL" ".#nixosConfigurations.xts1-minimal.config.system.build.sdImage"
          echo "xts1-minimal SD image: BUILD SUCCESS"
