name: FlakeChecker

on:
  push:
  schedule:
    # l33t o'clock
    - cron: '37 13 * * *'
  workflow_dispatch:

jobs:
  flake-checker:
    name: Flake Checker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'holster'
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            lazy-trees = true
#      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - uses: DeterminateSystems/flake-checker-action@v12

  notify:
    name: Notify Result
    needs: flake-checker
    if: always()
    runs-on: [self-hosted, nixos, builder]
    steps:
      - name: Notify via Apprise
        run: |
          RESULT="${{ needs.flake-checker.result }}"
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          if [ "$RESULT" = "success" ]; then
            curl -f --show-error --http1.1 --max-time 10 -X POST https://apprise.xrs444.net/notify/apprise \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"FlakeChecker: OK\",\"body\":\"Flake check passed.\",\"type\":\"success\",\"tag\":\"critical-infra\"}" || true
          else
            curl -f --show-error --http1.1 --max-time 10 -X POST https://apprise.xrs444.net/notify/apprise \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"FlakeChecker: Failed\",\"body\":\"Flake check failed. $RUN_URL\",\"type\":\"failure\",\"tag\":\"critical-infra\"}" || true
          fi
