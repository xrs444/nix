name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PUSHGATEWAY: http://localhost:9091
  APPRISE_URL: https://apprise.xrs444.net/notify

jobs:
  deploy:
    name: Build, Cache, and Deploy All Hosts
    runs-on: [self-hosted, nixos, builder]
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Build all hosts
        run: |
          HOSTS=(xsvr1 xsvr2 xsvr3 xcomm1 xlabmgmt xts1 xts2 xpbx1 xlt1-t-vnixos)
          FAILED=()
          for host in "${HOSTS[@]}"; do
            echo "Building $host..."
            if ! nix build ".#nixosConfigurations.$host.config.system.build.toplevel" --no-link; then
              FAILED+=("$host")
              echo "$host: BUILD FAILED"
            else
              echo "$host: BUILD OK"
            fi
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "BUILD_FAILED_HOSTS=${FAILED[*]}" >> "$GITHUB_ENV"
            echo "Build failures: ${FAILED[*]} — continuing to deploy successful hosts"
          fi

      - name: Push to binary cache
        run: |
          HOSTS=(xsvr1 xsvr2 xsvr3 xcomm1 xlabmgmt xts1 xts2 xpbx1 xlt1-t-vnixos)
          REMOTE_HOSTS=(xsvr2 xsvr3 xcomm1 xlabmgmt xts1 xts2 xpbx1 xlt1-t-vnixos)
          read -ra FAILED_HOSTS <<< "${BUILD_FAILED_HOSTS:-}"
          for host in "${HOSTS[@]}"; do
            if [[ " ${FAILED_HOSTS[*]} " == *" $host "* ]]; then
              echo "$host: skipping cache (build failed)"
              continue
            fi
            echo "Caching $host system toplevel..."
            nix copy --to "file:///zfs/nixcache/cache" \
              ".#nixosConfigurations.$host.config.system.build.toplevel" || true
            # For remote hosts, also build and cache the deploy-rs activatable system closure.
            # deploy-rs deploys .#deploy.nodes.$host.profiles.system.path, which wraps the
            # NixOS system with deploy-rs activation scripts. That wrapper's closure includes
            # deploy-rs-0.1.0, source, and nix.conf — paths not in the system toplevel and
            # therefore unsigned. The remote nix-daemon rejects unsigned pushes with
            # "cannot add path ... because it lacks a signature by a trusted key".
            # Building and signing here ensures all paths carry the xsvr1.lan-1 key.
            if [[ " ${REMOTE_HOSTS[*]} " == *" $host "* ]]; then
              echo "Building and caching $host deploy activation path..."
              # Use the same flake attribute path that deploy-rs evaluates at deploy time,
              # so the signed path hash matches exactly what gets pushed to the remote.
              DEPLOY_PATH=$(nix build --no-link --print-out-paths \
                ".#deploy.nodes.$host.profiles.system.path" \
                2>/dev/null) || true
              if [[ -n "$DEPLOY_PATH" ]]; then
                nix copy --to "file:///zfs/nixcache/cache" "$DEPLOY_PATH" || true
              fi
            fi
          done

      - name: Deploy remote hosts
        run: |
          REVISION=$(git rev-parse HEAD)
          REMOTE_HOSTS=(xsvr2 xsvr3 xcomm1 xlabmgmt xts1 xts2 xpbx1 xlt1-t-vnixos)
          read -ra FAILED_HOSTS <<< "${BUILD_FAILED_HOSTS:-}"
          DEPLOY_FAILED=()

          for host in "${REMOTE_HOSTS[@]}"; do
            if [[ " ${FAILED_HOSTS[*]} " == *" $host "* ]]; then
              echo "$host: skipping deploy (build failed)"
              continue
            fi
            echo "Deploying $host..."
            START=$(date +%s)
            if nix run --inputs-from . "deploy-rs#deploy-rs" -- --skip-checks ".#$host" 2>&1; then
              DURATION=$(( $(date +%s) - START ))
              printf 'deploy_last_success_timestamp_seconds{host="%s"} %s\ndeploy_duration_seconds{host="%s"} %s\ndeploy_git_revision_info{host="%s",revision="%s"} 1\ndeploy_total{host="%s",result="success"} 1\n' \
                "$host" "$(date +%s)" \
                "$host" "$DURATION" \
                "$host" "$REVISION" \
                "$host" \
                | curl --silent --data-binary @- "$PUSHGATEWAY/metrics/job/deploy/instance/$host" || true
              echo "$host: DEPLOY OK (${DURATION}s)"
            else
              DEPLOY_FAILED+=("$host")
              printf 'deploy_total{host="%s",result="failure"} 1\n' "$host" \
                | curl --silent --data-binary @- "$PUSHGATEWAY/metrics/job/deploy/instance/$host" || true
              echo "$host: DEPLOY FAILED"
            fi
          done

          ALL_FAILED=("${FAILED_HOSTS[@]}" "${DEPLOY_FAILED[@]}")
          if [ ${#ALL_FAILED[@]} -gt 0 ]; then
            echo "DEPLOY_FAILED_HOSTS=${DEPLOY_FAILED[*]}" >> "$GITHUB_ENV"
            curl -sf -X POST "$APPRISE_URL" \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"Deploy: Partial Failure\",\"body\":\"Build failed: ${FAILED_HOSTS[*]:-none} | Deploy failed: ${DEPLOY_FAILED[*]:-none}\",\"type\":\"warning\",\"tag\":\"critical-infra\"}" || true
          fi

      - name: Deploy xsvr1 (self)
        run: |
          read -ra FAILED_HOSTS <<< "${BUILD_FAILED_HOSTS:-}"
          if [[ " ${FAILED_HOSTS[*]} " == *" xsvr1 "* ]]; then
            echo "xsvr1: skipping deploy (build failed)"
            exit 0
          fi
          echo "Deploying xsvr1 (self)..."
          START=$(date +%s)
          systemctl start nixos-rebuild-ci.service
          DURATION=$(( $(date +%s) - START ))
          REVISION=$(git rev-parse HEAD)
          printf 'deploy_last_success_timestamp_seconds{host="xsvr1"} %s\ndeploy_duration_seconds{host="xsvr1"} %s\ndeploy_git_revision_info{host="xsvr1",revision="%s"} 1\ndeploy_total{host="xsvr1",result="success"} 1\n' \
            "$(date +%s)" "$DURATION" "$REVISION" \
            | curl --silent --data-binary @- "$PUSHGATEWAY/metrics/job/deploy/instance/xsvr1" || true
          echo "xsvr1: DEPLOY OK (${DURATION}s)"

      - name: Report final status
        if: always()
        run: |
          REVISION=$(git rev-parse --short HEAD)
          read -ra BUILD_FAILED <<< "${BUILD_FAILED_HOSTS:-}"
          read -ra DEPLOY_FAILED <<< "${DEPLOY_FAILED_HOSTS:-}"
          ALL_FAILED=("${BUILD_FAILED[@]}" "${DEPLOY_FAILED[@]}")

          if [ ${#ALL_FAILED[@]} -eq 0 ]; then
            curl -sf -X POST "$APPRISE_URL" \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"Deploy: Complete\",\"body\":\"All hosts deployed successfully ($REVISION)\",\"type\":\"success\"}" || true
          else
            curl -sf -X POST "$APPRISE_URL" \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"Deploy: Partial Failure\",\"body\":\"Build failed: ${BUILD_FAILED[*]:-none} | Deploy failed: ${DEPLOY_FAILED[*]:-none} ($REVISION) — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\",\"type\":\"failure\",\"tag\":\"critical-infra\"}" || true
            exit 1
          fi
