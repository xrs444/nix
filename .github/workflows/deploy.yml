name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PUSHGATEWAY: http://localhost:9091
  APPRISE_URL: https://apprise.xrs444.net/notify

jobs:
  deploy:
    name: Build, Cache, and Deploy All Hosts
    runs-on: [self-hosted, nixos, builder]
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Build all hosts
        run: |
          HOSTS=(xsvr1 xsvr2 xsvr3 xcomm1 xlabmgmt xts1 xts2 xpbx1 xlt1-t-vnixos)
          FAILED=()
          for host in "${HOSTS[@]}"; do
            echo "Building $host..."
            if ! nix build ".#nixosConfigurations.$host.config.system.build.toplevel" --no-link; then
              FAILED+=("$host")
              echo "$host: BUILD FAILED"
            else
              echo "$host: BUILD OK"
            fi
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "BUILD_FAILED_HOSTS=${FAILED[*]}" >> "$GITHUB_ENV"
            echo "Build failures: ${FAILED[*]} — continuing to deploy successful hosts"
          fi

      - name: Sign and push to binary cache
        run: |
          echo "=== Signing diagnostics ==="
          echo "Running as: $(id)"
          echo "Key permissions: $(ls -la /run/secrets/nixcache_signing_key 2>&1 || echo 'KEY NOT FOUND')"
          echo "==========================="

          # Purge narinfos that lack both trusted signatures from the file cache.
          # nix copy --to file:// skips paths already present in the cache and does NOT
          # update their narinfo Sig: fields. Paths cached before signing was configured
          # have stale narinfos with no signature; remotes reject them (require-sigs=true).
          # Deleting stale narinfos forces nix copy to regenerate them from the now-signed
          # local store, producing narinfos with Sig: xsvr1.lan-1:... entries.
          purge_stale_narinfos() {
            local store_path="$1"
            local count=0
            while IFS= read -r dep; do
              local hash
              hash=$(basename "$dep" | cut -d- -f1)
              local narinfo="/zfs/nixcache/cache/${hash}.narinfo"
              if [[ -f "$narinfo" ]] && \
                 ! grep -q "Sig: xsvr1.lan-1:" "$narinfo" && \
                 ! grep -q "Sig: cache.nixos.org-1:" "$narinfo"; then
                echo "  purging stale narinfo: ${hash}.narinfo"
                rm -f "$narinfo"
                (( count++ )) || true
              fi
            done < <(nix path-info --recursive "$store_path" 2>/dev/null)
            echo "  purged $count stale narinfos"
          }

          HOSTS=(xsvr1 xsvr2 xsvr3 xcomm1 xlabmgmt xts1 xts2 xpbx1 xlt1-t-vnixos)
          REMOTE_HOSTS=(xsvr2 xsvr3 xcomm1 xlabmgmt xts1 xts2 xpbx1 xlt1-t-vnixos)
          read -ra FAILED_HOSTS <<< "${BUILD_FAILED_HOSTS:-}"
          for host in "${HOSTS[@]}"; do
            if [[ " ${FAILED_HOSTS[*]} " == *" $host "* ]]; then
              echo "$host: skipping cache (build failed)"
              continue
            fi

            TOPLEVEL=$(nix build --no-link --print-out-paths \
              ".#nixosConfigurations.$host.config.system.build.toplevel" 2>/dev/null) || true
            [[ -z "$TOPLEVEL" ]] && { echo "$host: could not resolve toplevel, skipping"; continue; }

            # Sign every path in the closure with the nixcache key before pushing.
            echo "Signing $host closure..."
            if ! nix store sign --key-file /run/secrets/nixcache_signing_key \
              --recursive "$TOPLEVEL"; then
              echo "ERROR: signing failed for $host toplevel — key unreadable or sign error"
            fi

            echo "Caching $host system toplevel (purging stale narinfos first)..."
            purge_stale_narinfos "$TOPLEVEL"
            nix copy --to "file:///zfs/nixcache/cache" "$TOPLEVEL" || true

            # For remote hosts, also sign and cache the deploy-rs activatable system.
            # deploy-rs deploys .#deploy.nodes.$host.profiles.system.path, not the plain
            # toplevel. Evaluate via the same flake attribute deploy-rs uses so the
            # signed hash matches exactly what gets pushed to the remote.
            if [[ " ${REMOTE_HOSTS[*]} " == *" $host "* ]]; then
              echo "Signing and caching $host deploy activation path..."
              DEPLOY_PATH=$(nix build --no-link --print-out-paths \
                ".#deploy.nodes.$host.profiles.system.path" 2>/dev/null) || true
              if [[ -n "$DEPLOY_PATH" ]]; then
                if ! nix store sign --key-file /run/secrets/nixcache_signing_key \
                  --recursive "$DEPLOY_PATH"; then
                  echo "ERROR: signing failed for $host deploy path — key unreadable or sign error"
                fi
                purge_stale_narinfos "$DEPLOY_PATH"
                nix copy --to "file:///zfs/nixcache/cache" "$DEPLOY_PATH" || true
              fi
            fi
          done

      - name: Sign and cache deploy-rs binary
        run: |
          # deploy-rs pushes its own binary (deploy-rs-0.1.0) and activate-rs to each
          # remote host so it can invoke activate-rs for the system switch. These paths
          # are not part of any NixOS system closure, so the per-host signing loop above
          # never covers them. Without a signed narinfo in the file cache, the remote
          # daemon rejects them (require-sigs=true, no trusted-user bypass in modern Nix).
          DEPLOY_RS_PATH=$(nix build --no-link --print-out-paths \
            "deploy-rs#deploy-rs" 2>/dev/null) || true
          if [[ -n "$DEPLOY_RS_PATH" ]]; then
            nix store sign --key-file /run/secrets/nixcache_signing_key \
              --recursive "$DEPLOY_RS_PATH"
            echo "Purging stale deploy-rs narinfos..."
            nix path-info --recursive "$DEPLOY_RS_PATH" 2>/dev/null | while read -r dep; do
              hash=$(basename "$dep" | cut -d- -f1)
              narinfo="/zfs/nixcache/cache/${hash}.narinfo"
              if [[ -f "$narinfo" ]] && \
                 ! grep -q "Sig: xsvr1.lan-1:" "$narinfo" && \
                 ! grep -q "Sig: cache.nixos.org-1:" "$narinfo"; then
                echo "  purging stale narinfo: ${hash}.narinfo"
                rm -f "$narinfo"
              fi
            done
            nix copy --to "file:///zfs/nixcache/cache" "$DEPLOY_RS_PATH" || true
            echo "deploy-rs binary signed and cached: $DEPLOY_RS_PATH"
          else
            echo "WARNING: could not resolve deploy-rs binary path — deploy may fail"
          fi

      - name: Deploy remote hosts
        run: |
          REVISION=$(git rev-parse HEAD)
          REMOTE_HOSTS=(xsvr2 xsvr3 xcomm1 xlabmgmt xts1 xts2 xpbx1 xlt1-t-vnixos)
          read -ra FAILED_HOSTS <<< "${BUILD_FAILED_HOSTS:-}"
          DEPLOY_FAILED=()

          for host in "${REMOTE_HOSTS[@]}"; do
            if [[ " ${FAILED_HOSTS[*]} " == *" $host "* ]]; then
              echo "$host: skipping deploy (build failed)"
              continue
            fi
            echo "Deploying $host..."
            START=$(date +%s)
            if nix run --inputs-from . "deploy-rs#deploy-rs" -- --skip-checks ".#$host" 2>&1; then
              DURATION=$(( $(date +%s) - START ))
              printf 'deploy_last_success_timestamp_seconds{host="%s"} %s\ndeploy_duration_seconds{host="%s"} %s\ndeploy_git_revision_info{host="%s",revision="%s"} 1\ndeploy_total{host="%s",result="success"} 1\n' \
                "$host" "$(date +%s)" \
                "$host" "$DURATION" \
                "$host" "$REVISION" \
                "$host" \
                | curl --silent --data-binary @- "$PUSHGATEWAY/metrics/job/deploy/instance/$host" || true
              echo "$host: DEPLOY OK (${DURATION}s)"
            else
              DEPLOY_FAILED+=("$host")
              printf 'deploy_total{host="%s",result="failure"} 1\n' "$host" \
                | curl --silent --data-binary @- "$PUSHGATEWAY/metrics/job/deploy/instance/$host" || true
              echo "$host: DEPLOY FAILED"
            fi
          done

          ALL_FAILED=("${FAILED_HOSTS[@]}" "${DEPLOY_FAILED[@]}")
          if [ ${#ALL_FAILED[@]} -gt 0 ]; then
            echo "DEPLOY_FAILED_HOSTS=${DEPLOY_FAILED[*]}" >> "$GITHUB_ENV"
            curl -sf --max-time 10 -X POST "$APPRISE_URL" \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"Deploy: Partial Failure\",\"body\":\"Build failed: ${FAILED_HOSTS[*]:-none} | Deploy failed: ${DEPLOY_FAILED[*]:-none}\",\"type\":\"warning\",\"tag\":\"critical-infra\"}" || true
          fi

      - name: Deploy xsvr1 (self)
        run: |
          read -ra FAILED_HOSTS <<< "${BUILD_FAILED_HOSTS:-}"
          if [[ " ${FAILED_HOSTS[*]} " == *" xsvr1 "* ]]; then
            echo "xsvr1: skipping deploy (build failed)"
            exit 0
          fi
          echo "Deploying xsvr1 (self)..."
          START=$(date +%s)
          # Create permit token — nixos-rebuild-ci.service requires this to run.
          # Without it, any stale/accidental invocation aborts instead of killing
          # the runner mid-job. The service consumes the token atomically.
          touch /tmp/nixos-rebuild-ci-permitted
          systemctl start nixos-rebuild-ci.service
          DURATION=$(( $(date +%s) - START ))
          REVISION=$(git rev-parse HEAD)
          printf 'deploy_last_success_timestamp_seconds{host="xsvr1"} %s\ndeploy_duration_seconds{host="xsvr1"} %s\ndeploy_git_revision_info{host="xsvr1",revision="%s"} 1\ndeploy_total{host="xsvr1",result="success"} 1\n' \
            "$(date +%s)" "$DURATION" "$REVISION" \
            | curl --silent --data-binary @- "$PUSHGATEWAY/metrics/job/deploy/instance/xsvr1" || true
          echo "xsvr1: DEPLOY OK (${DURATION}s)"

      - name: Report final status
        if: always()
        run: |
          REVISION=$(git rev-parse --short HEAD)
          read -ra BUILD_FAILED <<< "${BUILD_FAILED_HOSTS:-}"
          read -ra DEPLOY_FAILED <<< "${DEPLOY_FAILED_HOSTS:-}"
          ALL_FAILED=("${BUILD_FAILED[@]}" "${DEPLOY_FAILED[@]}")

          if [ ${#ALL_FAILED[@]} -eq 0 ]; then
            curl -sf --max-time 10 -X POST "$APPRISE_URL" \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"Deploy: Complete\",\"body\":\"All hosts deployed successfully ($REVISION)\",\"type\":\"success\"}" || true
          else
            curl -sf --max-time 10 -X POST "$APPRISE_URL" \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"Deploy: Partial Failure\",\"body\":\"Build failed: ${BUILD_FAILED[*]:-none} | Deploy failed: ${DEPLOY_FAILED[*]:-none} ($REVISION) — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\",\"type\":\"failure\",\"tag\":\"critical-infra\"}" || true
            exit 1
          fi
