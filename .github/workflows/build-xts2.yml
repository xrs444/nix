name: Build xts2

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'hosts/nixos-arm/xts2/**'
      - 'overlays/**'
      - 'flake.nix'
      - 'flake.lock'

jobs:
  build:
    name: Build xts2
    runs-on: [self-hosted, nixos, builder]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Build xts2
        run: |
          CACHE_URL="file:///zfs/nixcache/cache"
          echo "Building xts2..."
          nix build ".#nixosConfigurations.xts2.config.system.build.toplevel" \
            --no-link \
            --max-jobs 2 \
            --cores 4
          echo "Copying to cache..."
          nix copy --to "$CACHE_URL" ".#nixosConfigurations.xts2.config.system.build.toplevel"
          echo "xts2: BUILD SUCCESS"

      - name: Build xts2-minimal SD image
        run: |
          CACHE_URL="file:///zfs/nixcache/cache"
          echo "Building xts2-minimal SD image..."
          nix build ".#nixosConfigurations.xts2-minimal.config.system.build.sdImage" \
            --no-link \
            --max-jobs 2 \
            --cores 4
          echo "Copying SD image to cache..."
          nix copy --to "$CACHE_URL" ".#nixosConfigurations.xts2-minimal.config.system.build.sdImage"
          echo "xts2-minimal SD image: BUILD SUCCESS"

      - name: Notify build failure
        if: failure()
        run: |
          curl -sf -X POST https://apprise.xrs444.net/notify/apprise \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"Build Failed: xts2\",\"body\":\"GitHub Actions build failed for xts2. $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\",\"type\":\"failure\",\"tag\":\"critical-infra\"}" || true
