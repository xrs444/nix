name: Build xhac-radio

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'hosts/nixos-arm/xhac-radio/**'
      - 'overlays/**'
      - 'flake.nix'
      - 'flake.lock'

jobs:
  build:
    name: Build xhac-radio
    runs-on: [self-hosted, nixos, builder]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Build xhac-radio
        run: |
          CACHE_URL="file:///zfs/nixcache/cache"
          echo "Building xhac-radio..."
          nix build ".#nixosConfigurations.xhac-radio.config.system.build.toplevel" \
            --no-link \
            --max-jobs 2 \
            --cores 4
          echo "Copying to cache..."
          nix copy --to "$CACHE_URL" ".#nixosConfigurations.xhac-radio.config.system.build.toplevel"
          echo "xhac-radio: BUILD SUCCESS"

      - name: Build xhac-radio-minimal SD image
        run: |
          CACHE_URL="file:///zfs/nixcache/cache"
          echo "Building xhac-radio-minimal SD image..."
          nix build ".#nixosConfigurations.xhac-radio-minimal.config.system.build.sdImage" \
            --no-link \
            --max-jobs 2 \
            --cores 4
          echo "Copying SD image to cache..."
          nix copy --to "$CACHE_URL" ".#nixosConfigurations.xhac-radio-minimal.config.system.build.sdImage"
          echo "xhac-radio-minimal SD image: BUILD SUCCESS"
