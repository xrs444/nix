# Home Assistant Prometheus Token
# This file stores the long-lived access token for Prometheus to scrape Home Assistant metrics
#
# To encrypt this file with sops:
# 1. Replace YOUR_TOKEN_HERE with the actual token from Home Assistant
# 2. Run: sops -e -i homeassistant-prometheus.yaml
# 3. The token will be encrypted in place
#
# To decrypt/edit:
# sops homeassistant-prometheus.yaml

token: YOUR_TOKEN_HERE
